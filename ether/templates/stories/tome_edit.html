{% extends "base.html" %}
{% block content %}
  <nav aria-label="breadcrumb"><a href="/stories">Stories</a> / <a href="/stories/{{ tome.saga }}">{{ tome.saga }}</a> / <a href="/stories/tomes/{{ tome.id }}">Tome {{ tome.numero }}</a> / modifier</nav>
  <h1>Modifier — {{ tome.name }}</h1>

  <form method="post" action="/stories/tomes/{{ tome.id }}/edit">
    <div class="grid">
      <label>Titre <input type="text" name="titre" value="{{ meta.name }}" required></label>
      <label>Numéro <input type="number" name="numero" value="{{ meta.numero }}" required></label>
      <label>Statut
        <select name="statut">
          {% for choice in ['brouillon', 'en cours', 'validé'] %}
            <option value="{{ choice }}" {% if meta.status == choice %}selected{% endif %}>{{ choice }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <label>Thème spécifique <input type="text" name="theme_specifique" value="{{ meta.theme_specifique }}"></label>
    <label>Question centrale <input type="text" name="question_centrale" value="{{ meta.question_centrale }}"></label>
    <label>Fiches liées — ids de l'univers (séparés par des virgules)
      <input type="text" name="related" value="{{ related_text }}">
    </label>
    <button type="submit">Enregistrer</button>
  </form>
{% endblock %}
