{% extends "base.html" %}
{% block content %}
  <h1>Séquencier</h1>

  <ul>
    {% for tome in tomes %}
      <li><a href="/sequencer/tomes/{{ tome.id }}">Tome {{ tome.numero }} — {{ tome.titre }}</a></li>
    {% else %}
      <li><small>Aucun tome pour l'instant.</small></li>
    {% endfor %}
  </ul>

  <article>
    <h2>Nouveau tome</h2>
    <form method="post" action="/sequencer/tomes">
      <div class="grid">
        <label>Numéro <input type="number" name="numero" required></label>
        <label>Titre <input type="text" name="titre" required></label>
      </div>
      <label>Thème spécifique <input type="text" name="theme_specifique"></label>
      <label>Question centrale <input type="text" name="question_centrale"></label>
      <button type="submit">Créer le tome</button>
    </form>
  </article>
{% endblock %}
